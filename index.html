<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>猫娘TI 人格测试</title>
  <meta name="description" content="用猫娘的方式重新认识你自己喵~ 基于15维度猫娘人格模型的趣味测试。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
  <script type="module" src="src/main.js"></script>
</head>
<body>
  <div id="loading-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fffafa; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
    <div style="font-size: 64px; margin-bottom: 20px; animation: pulse 1.5s infinite;">🐱</div>
    <div style="color: #ff6978; font-weight: bold;">正在召唤猫娘中...</div>
    <style>
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
      }
    </style>
  </div>

  <div id="app-content" style="display: none;">
    <!-- 首页 -->
    <div id="page-intro" class="page active">

    <div class="card">
      <div class="logo">🐱</div>
      <h1>猫娘TI</h1>
      <p class="subtitle">用猫娘的方式，重新认识你自己喵~</p>
      <p class="credit">基于 SBTI 框架改编 · 猫娘版</p>
      <button id="btn-start" class="btn btn-primary">开始测试喵！</button>
      <p class="fun-note">本测试纯属娱乐，不能当猫粮推荐依据喵~</p>
    </div>
  </div>

  <!-- 答题页 -->
  <div id="page-quiz" class="page">
    <div class="card">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div id="progress-text" class="progress-text">0 / 31</div>
      <div class="question-area">
        <p id="question-text" class="question-text"></p>
        <div id="options" class="options"></div>
      </div>
    </div>
  </div>

  <!-- 结果页 -->
  <div id="page-result" class="page">
    <div class="card">
      <p id="result-kicker" class="kicker">你的猫娘类型</p>
      <h2 id="result-code" class="result-code"></h2>
      <h3 id="result-name" class="result-name"></h3>
      <p id="result-badge" class="badge"></p>
      <p id="result-intro" class="result-intro"></p>
      <p id="result-desc" class="result-desc"></p>

      <div id="result-secondary" class="secondary" style="display:none">
        <p>你的隐藏猫格：<span id="secondary-info"></span></p>
      </div>

      <div class="radar-wrap">
        <canvas id="radar-chart" width="320" height="320"></canvas>
      </div>

      <div id="dimensions-detail" class="dimensions-detail"></div>

      <h4 class="top-title">最匹配的 5 种猫娘类型</h4>
      <div id="top-list" class="top-list"></div>

      <p id="disclaimer" class="disclaimer"></p>

      <div class="actions">
        <button id="btn-download" class="btn btn-primary">保存分享图喵</button>
        <button id="btn-restart" class="btn btn-secondary">再测一次喵</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
